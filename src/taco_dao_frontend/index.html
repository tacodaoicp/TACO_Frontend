<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=0.75, maximum-scale=0.75, user-scalable=0" />
  <meta name="robots" content="index, follow" />
  <!-- Preconnect to external iframe sources for faster loading -->
  <link rel="preconnect" href="https://dexscreener.com" />
  <link rel="preconnect" href="https://www.youtube-nocookie.com" />
  <link rel="dns-prefetch" href="https://dexscreener.com" />
  <link rel="dns-prefetch" href="https://www.youtube-nocookie.com" />
  <!-- IC Network preconnects for faster canister calls -->
  <link rel="preconnect" href="https://ic0.app" crossorigin />
  <link rel="dns-prefetch" href="https://ic0.app" />
  <link rel="preconnect" href="https://identity.ic0.app" crossorigin />
  <link rel="dns-prefetch" href="https://identity.ic0.app" />
  <link rel="preconnect" href="https://icp0.io" crossorigin />
  <link rel="dns-prefetch" href="https://icp0.io" />
  <link rel="preconnect" href="https://id.ai" crossorigin />
  <link rel="dns-prefetch" href="https://id.ai" />
  <!-- Crypto API preconnect -->
  <link rel="preconnect" href="https://api.geckoterminal.com" crossorigin />
  <link rel="dns-prefetch" href="https://api.geckoterminal.com" />
  <link rel="preconnect" href="https://api.coingecko.com" crossorigin />
  <link rel="dns-prefetch" href="https://api.coingecko.com" />
  <!-- Google Fonts: ship the stylesheet from HTML so font requests fire in
       parallel with the JS bundle parse, instead of waiting for ExchangeApp
       to mount and inject them. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" />
  <link rel="canonical" href="https://tacodao.com/" />
  <link rel="icon" href="/favicon.ico" sizes="any" type="image/x-icon" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <title>Taco Dao</title>
  <meta property="og:title" content="Taco Dao" />
  <meta property="og:description" content="The tastiest entry point in crypto" />
  <meta property="og:image" content="https://tacodao.com/td-light-1200x650.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://tacodao.com/td-light-1200x650.png" />
  <meta name="twitter:title" content="Taco Dao" />
  <meta name="twitter:description" content="The tastiest entry point in crypto" />
  <meta name="google-site-verification" content="OjOq1Il_nYh50yhQlF1pia4Pj19I-ClPVH_CiI3Ys2w" />
  <!-- Exchange boot spinner: pure CSS so it paints the instant the (blank) tab
       opens, before any JS/font/asset loads. Shown only for the Exchange app
       (see inline script in <body>); the DAO app keeps its own loader. -->
  <style>
    #ex-boot {
      position: fixed;
      inset: 0;
      z-index: 2147483647;
      display: none; /* shown only for the exchange app via inline script */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: #0e0b08;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    }
    #ex-boot .ring {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 4px solid rgba(242, 139, 58, 0.18);
      border-top-color: #f28b3a; /* --tx-orange */
      animation: ex-boot-spin 0.8s linear infinite;
    }
    #ex-boot p {
      margin: 0;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: #f28b3a;
      opacity: 0.85;
    }
    #ex-boot.ex-boot--hide {
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }
    @keyframes ex-boot-spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      #ex-boot .ring { animation-duration: 1.6s; }
    }
  </style>
</head>

<body>
  <div id="ex-boot" aria-hidden="true">
    <div class="ring"></div>
    <p>Loading exchange…</p>
  </div>
  <script>
    // Show the boot spinner only for the Exchange app. Runs synchronously
    // during parse (before the deferred module script), using the same host/
    // path detection as main.js, so the DAO app never flashes it.
    (function () {
      var h = location.hostname, p = location.pathname;
      var isExchange = h === 'exchange.tacodao.com' || h === 'exchange.ic0.io' || p.indexOf('/exchange') === 0;
      if (!isExchange) return;
      var el = document.getElementById('ex-boot');
      if (!el) return;
      el.style.display = 'flex';
      // Safety net: never trap the user on the spinner if the bundle fails to
      // load. Normal teardown happens in bootExchange() within ~1-2s.
      setTimeout(function () {
        var n = document.getElementById('ex-boot');
        if (n) n.remove();
      }, 20000);
    })();
  </script>
  <div id="app"></div>
  <script src="/src/main.js" type="module"></script>
</body>

</html>
